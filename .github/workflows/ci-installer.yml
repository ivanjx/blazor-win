name: Build sideload installer

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    env:
      WinFormsProjectPath: src\BlazorHybrid.WinForms\BlazorHybrid.WinForms.csproj
      PackagingProjectPath: src\BlazorHybrid.Packaging\BlazorHybrid.Packaging.wapproj
      AppPackagesDirectory: AppPackages
      BuildPlatform: x64
      BundlePlatforms: x64|arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/BlazorHybrid.ClientScripts/package-lock.json

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install npm dependencies
        working-directory: src/BlazorHybrid.ClientScripts
        run: npm ci

      - name: Restore .NET projects
        run: dotnet restore $env:WinFormsProjectPath

      - name: Create signing certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=BlazorHybrid" -KeyUsage DigitalSignature -KeyAlgorithm RSA -KeyLength 2048 -HashAlgorithm SHA256 -KeyExportPolicy Exportable -FriendlyName "BlazorHybrid CI" -CertStoreLocation Cert:\CurrentUser\My -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}") -NotAfter (Get-Date).AddYears(5)
          $artifactRoot = Join-Path $env:GITHUB_WORKSPACE $env:AppPackagesDirectory
          New-Item -ItemType Directory -Force -Path $artifactRoot | Out-Null
          $certRoot = Join-Path $env:RUNNER_TEMP "BlazorHybrid.CI"
          New-Item -ItemType Directory -Force -Path $certRoot | Out-Null
          $pfxPath = Join-Path $certRoot "BlazorHybrid.CI.pfx"
          $cerPath = Join-Path $certRoot "BlazorHybrid.CI.cer"
          & certutil -user -exportpfx -p "" My $cert.Thumbprint $pfxPath | Out-Null
          Export-Certificate -Cert $cert -FilePath $cerPath | Out-Null
          "SIGNING_CERT=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Publish sideload package bundle
        run: >
          msbuild $env:PackagingProjectPath /t:Publish
          /p:Configuration=Release
          /p:Platform=$env:BuildPlatform
          /p:SelfContained=true
          /p:RuntimeIdentifier=win-$env:BuildPlatform
          /p:UapAppxPackageBuildMode=SideloadOnly
          /p:GenerateAppxPackageOnBuild=true
          /p:AppxBundle=Always
          /p:AppxBundlePlatforms="$env:BundlePlatforms"
          /p:AppxPackageDir="$env:GITHUB_WORKSPACE\$env:AppPackagesDirectory\"
          /p:AppxPackageSigningEnabled=true
          /p:PackageCertificateKeyFile="$env:SIGNING_CERT"
          /p:PackageCertificatePassword=""

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blazorhybrid-sideload-installer
          path: |
            AppPackages\*
